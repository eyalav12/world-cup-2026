# Local full stack: docker compose --env-file .env.docker up --build
# Open http://localhost:3000
#
# Postgres: uses YOUR existing DB on the host (see .env.docker), not a new empty container.

services:
  redis:
    image: redis:7-alpine

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}

  server:
    build: ./world-cup-server
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      SERVER_PORT: 8083
      FOOTBALLDATA_API_TOKEN: ${FOOTBALLDATA_API_TOKEN:-}
      ODDSDATA_API_TOKEN: ${ODDSDATA_API_TOKEN:-}
      NEWSDATA_API_TOKEN: ${NEWSDATA_API_TOKEN:-}
    ports:
      - "8083:8083"

  agents:
    build: ./world-cup-agents
    depends_on:
      - server
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      BACKEND_API_URL: http://server:8083
    ports:
      - "8000:8000"

  web:
    build:
      context: ./world-cup-web
      args:
        API_BASE_URL: http://server:8083
        AGENT_API_URL: http://agents:8000
    depends_on:
      - server
      - agents
    environment:
      API_BASE_URL: http://server:8083
      AGENT_API_URL: http://agents:8000
    ports:
      - "3000:3000"
