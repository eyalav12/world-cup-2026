spring.application.name=demo

# Optional local file with real DB + API keys (gitignored). Copy from application-local.properties.example
spring.config.import=optional:classpath:application-local.properties

# Database — override via application-local.properties or env: DB_URL, DB_USERNAME, DB_PASSWORD
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/worldcup}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
server.port=${SERVER_PORT:8083}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
rabbitmq.gamesqueue.name=gamesqueue
rabbitmq.gamesexchange.name=gamesexchange
rabbitmq.gamesroutekey.name=gameseroutekey
rabbitmq.matchupdatequeue.name=matchupdatequeue
rabbitmq.notificationsqueue.name=notificationsqueue

# External APIs — set tokens in application-local.properties or env vars
footballdata.api.token=${FOOTBALLDATA_API_TOKEN:}
footballdata.api.base-url=https://api.football-data.org/v4
oddsdata.api.token=${ODDSDATA_API_TOKEN:}
oddsdata.api.base-url=https://api.the-odds-api.com/v4
newsdata.api.token=${NEWSDATA_API_TOKEN:}
newsdata.api.base-url=https://newsapi.org/v2/everything
polymarket.api.base-url=https://gamma-api.polymarket.com/events?slug
